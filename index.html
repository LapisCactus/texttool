<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>テキスト表示ページ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192x192.png">
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="storage.js"></script>
</head>
<body>
    <div class="app-bar">
        <button class="menu-button" onclick="toggleMenu()">&#9776;</button>
        <h1>テキスト表示アプリ</h1>
        <div class="action-buttons">
            <button onclick="location.href='index.html'">📄 Index</button>
            <button onclick="location.href='manage.html'">⚙️ Manage</button>
        </div>
    </div>
    <div class="container">
        <div class="left-column" id="leftColumn">
            <h2>グループ選択</h2>
            <label for="groupSelect">グループを選択してください：</label>
            <select id="groupSelect" name="groupSelect" onchange="index_updateFileList()">
                <option value="">選択してください</option>
            </select>

            <h2>ローカルストレージ検索</h2>
            <label for="searchKeyword">キーワードを入力してください：</label>
            <input type="text" id="searchKeyword" name="searchKeyword">
            <button onclick="storage_searchLocal()">検索</button>

            <h2>ファイル個別の表示</h2>
            <label for="fileTitle">ファイルタイトルを選択してください：</label>
            <select id="fileTitle" name="fileTitle" onchange="storage_loadText()">
                <option value="">選択してください</option>
            </select>
        </div>
        <div class="right-column" id="rightColumn">
            <div id="searchResults">
                <p>ここに検索結果が表示されます。</p>
            </div>
            <div id="textContent">
                <p>ここにテキストが表示されます。</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            index_updateGroupSelect();
        });

        function toggleMenu() {
            const leftColumn = document.getElementById('leftColumn');
            const rightColumn = document.getElementById('rightColumn');
            if (leftColumn.style.display === 'none') {
                leftColumn.style.display = 'block';
                rightColumn.style.flex = '1';
            } else {
                leftColumn.style.display = 'none';
                rightColumn.style.flex = '100%';
            }
        }
        // グループ選択肢を更新する関数
        function index_updateGroupSelect() {
            const groupSelect = document.getElementById('groupSelect');
            if (!groupSelect) return;
            groupSelect.innerHTML = '<option value="">選択してください</option>';
            storage2_group_walk(function(groupName) {
                const option = document.createElement('option');
                option.value = groupName;
                option.text = groupName;
                groupSelect.add(option);
            });
        }
        // ファイルリスト選択肢を更新する関数
        function index_updateFileList() {
            const groupSelect = document.getElementById('groupSelect');
            const groupName = groupSelect.value;
            const fileTitleSelect = document.getElementById('fileTitle');
            if (!fileTitleSelect) return;
            fileTitleSelect.innerHTML = '<option value="">選択してください</option>';

            storage2_file_walk(groupName, function(fileUrl, title) {
                const option = document.createElement('option');
                option.value = `${groupName}_${fileUrl}`;
                option.text = title;
                fileTitleSelect.add(option);
            });
        }
        // テキストを読み込み表示する関数
        function storage_loadText() {
            const fileTitleSelect = document.getElementById('fileTitle');
            const fileUrl = fileTitleSelect.value;

            if (!fileUrl) {
                document.getElementById('textContent').innerText = 'ファイルを選択してください';
                return;
            }

            const savedText = storage2_get_filetext(fileUrl);
            if (savedText) {
                document.getElementById('textContent').innerText = savedText;
                return;
            }

            alert('選択されたファイルのテキストが見つかりません');
        }
        // Service Workerの登録
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js').then(function(registration) {
                    console.log('Service Workerの登録に成功しました:', registration.scope);
                }, function(err) {
                    console.log('Service Workerの登録に失敗しました:', err);
                });
            });
        }
    </script>
</body>
</html>
